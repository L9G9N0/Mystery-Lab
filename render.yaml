services:
  - type: web
    name: mystery-lab-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: STORAGE_PROVIDER
        value: local
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
